<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Trava de endereço oficial: URLs de deploy do Vercel (ex.: defy-clinicas-<hash>-...vercel.app)
      // são builds CONGELADAS e prendem o paciente numa versão antiga. Se o app abrir num host
      // *.vercel.app que não seja o oficial, redireciona para o endereço oficial, preservando
      // caminho/busca/hash (importante para os links de recuperação de senha). Previews de branch
      // (-git-) são poupados para não atrapalhar testes da equipe.
      (function () {
        try {
          var oficial = 'app-institutogenyfreitas.vercel.app'
          var h = location.hostname
          if (h !== oficial && /\.vercel\.app$/.test(h) && h.indexOf('-git-') === -1) {
            location.replace('https://' + oficial + location.pathname + location.search + location.hash)
          }
        } catch (e) { /* no-op */ }
      })()
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f766e" />
    <title>Instituto Geny Freitas</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
